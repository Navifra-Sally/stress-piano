<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스트레스 해소 피아노 🎹</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎹</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#08080c;min-height:100vh;display:flex;flex-direction:column;font-family:'Noto Sans KR',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation}
  canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
  .rage-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;opacity:0;transition:opacity .15s}
  .rage-overlay.active{opacity:1}

  /* ─── Top HUD ─── */
  .top-hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:center;align-items:center;gap:16px;padding:12px 20px;background:linear-gradient(180deg,rgba(8,8,12,.92) 0%,transparent 100%);pointer-events:none;flex-wrap:wrap}
  .top-hud>*{pointer-events:auto}
  .brand{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#ff6fd8,#3813c2,#00fff0);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 4s ease infinite;letter-spacing:2px}
  .brand.rage-title{animation:rageTitle .12s infinite,gradShift 4s ease infinite}
  @keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @keyframes rageTitle{0%{transform:translate(-2px,0)}50%{transform:translate(2px,-1px)}100%{transform:translate(-1px,1px)}}

  .rage-section{display:flex;align-items:center;gap:6px}
  .rage-label{font-size:.48rem;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.15);transition:color .3s;min-width:70px;text-align:right}
  .rage-label.heated{color:#f59e0b}
  .rage-label.rage{color:#ef4444;animation:rageTitle .1s infinite}
  .rage-label.fury{color:#ff2200;animation:rageTitle .06s infinite;font-size:.58rem}
  .rage-meter{width:100px;height:4px;border-radius:2px;background:rgba(255,255,255,.05);overflow:hidden}
  .rage-meter-fill{height:100%;width:0%;border-radius:2px;transition:width .15s;background:linear-gradient(90deg,#3b82f6,#8b5cf6)}
  .rage-meter-fill.heated{background:linear-gradient(90deg,#f59e0b,#ef4444)}
  .rage-meter-fill.rage{background:linear-gradient(90deg,#ef4444,#dc2626);animation:ragePulse .3s infinite}
  .rage-meter-fill.fury{background:linear-gradient(90deg,#ff0040,#ff6600,#ff0040);background-size:200%;animation:furyPulse .2s infinite}
  @keyframes ragePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
  @keyframes furyPulse{0%{background-position:0%;filter:brightness(1.3)}100%{background-position:200%;filter:brightness(1.8)}}

  /* ─── Currency ─── */
  .currency{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:12px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.12);font-size:.7rem;font-weight:700;color:#ffd700;letter-spacing:.5px;min-width:80px;justify-content:center;transition:transform .1s}
  .currency.pop{transform:scale(1.12)}
  .currency .note-icon{font-size:.85rem}

  .multiplier{font-size:.5rem;color:rgba(255,255,255,.25);font-weight:300;letter-spacing:1px;padding:2px 8px;border-radius:8px;background:rgba(255,255,255,.03)}
  .multiplier.boosted{color:#f59e0b;background:rgba(255,180,0,.08)}
  .song-indicator{font-size:.5rem;color:rgba(255,255,255,.3);font-weight:300;letter-spacing:1px;padding:2px 8px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}

  /* ─── Level HUD ─── */
  .level-hud{display:flex;align-items:center;gap:6px;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
  .level-badge{font-size:.85rem;line-height:1}
  .level-info{display:flex;flex-direction:column;gap:1px}
  .level-num{font-size:.55rem;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:1px}
  .level-title{font-size:.4rem;color:rgba(255,255,255,.4);letter-spacing:.5px}
  .xp-bar{width:60px;height:3px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden}
  .xp-bar-fill{height:100%;width:0%;border-radius:2px;transition:width .25s ease;background:linear-gradient(90deg,#3b82f6,#8b5cf6)}

  /* ─── Tier Piano Effects ─── */
  .tier-apprentice .white-key:active,.tier-apprentice .white-key.active{box-shadow:0 0 12px rgba(139,92,246,.3)}
  .tier-apprentice .black-key:active,.tier-apprentice .black-key.active{box-shadow:0 0 10px rgba(139,92,246,.4)}
  .tier-performer .piano-fallboard{border-bottom:1px solid rgba(255,215,0,.25)}
  .tier-virtuoso .white-key{transition:box-shadow .15s}
  .tier-virtuoso .white-key:hover{box-shadow:0 0 8px rgba(255,215,0,.15)}
  .tier-grandmaster .piano-body{box-shadow:0 0 30px rgba(255,111,216,.08)}
  .tier-legendary .piano-body{box-shadow:0 0 40px rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.1)}

  /* ─── Key Unlock Animation ─── */
  @keyframes keyUnlock{0%{transform:scaleY(0);opacity:0}60%{transform:scaleY(1.05);opacity:1}100%{transform:scaleY(1);opacity:1}}
  .key-new{animation:keyUnlock .6s ease-out forwards;transform-origin:bottom}

  /* ─── Shop Button ─── */
  .shop-btn{padding:5px 14px;border-radius:14px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.15);color:rgba(255,215,0,.6);font-size:.65rem;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;letter-spacing:1px}
  .shop-btn:hover{background:rgba(255,215,0,.15);color:#ffd700}
  .shop-btn.has-new{animation:shopPulse 2s ease infinite}
  @keyframes shopPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0)}50%{box-shadow:0 0 0 6px rgba(255,215,0,.15)}}


  /* ═══ SHOP PANEL ═══ */
  .shop-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
  .shop-overlay.open{opacity:1;pointer-events:auto}

  .shop-panel{position:fixed;top:0;right:-420px;width:400px;max-width:92vw;height:100vh;z-index:51;background:linear-gradient(180deg,#111118 0%,#0c0c12 100%);border-left:1px solid rgba(255,255,255,.06);box-shadow:-20px 0 60px rgba(0,0,0,.5);transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
  .shop-panel.open{right:0}

  .shop-header{padding:20px 20px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .shop-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:2px}
  .shop-close{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .shop-close:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}

  .shop-currency{padding:10px 20px;background:rgba(255,215,0,.03);border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:6px;flex-shrink:0}
  .shop-currency .note-icon{font-size:1rem;color:#ffd700}
  .shop-currency .amount{font-size:1rem;font-weight:900;color:#ffd700}

  .shop-scroll{flex:1;overflow-y:auto;padding:12px 16px 100px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
  .shop-scroll::-webkit-scrollbar{width:4px}
  .shop-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

  .shop-category{margin-bottom:20px}
  .shop-cat-title{font-size:.6rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:10px;padding-left:4px}

  .shop-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-bottom:6px;transition:all .2s;cursor:default}
  .shop-item:hover{background:rgba(255,255,255,.04)}
  .shop-item.owned{border-color:rgba(100,255,180,.12);background:rgba(100,255,180,.03)}
  .shop-item.equipped{border-color:rgba(255,215,0,.2);background:rgba(255,215,0,.04)}

  .item-icon{font-size:1.3rem;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.03);flex-shrink:0}
  .item-info{flex:1;min-width:0}
  .item-name{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:2px}
  .item-desc{font-size:.5rem;color:rgba(255,255,255,.25);font-weight:300;line-height:1.4}

  .item-action{flex-shrink:0}
  .buy-btn{padding:5px 12px;border-radius:10px;font-size:.55rem;font-weight:700;cursor:pointer;border:1px solid;transition:all .2s;font-family:'Noto Sans KR',sans-serif;letter-spacing:.5px}
  .buy-btn.can-buy{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.25);color:#ffd700}
  .buy-btn.can-buy:hover{background:rgba(255,215,0,.2)}
  .buy-btn.cant-buy{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);color:rgba(255,255,255,.2);cursor:default}
  .buy-btn.equipped-btn{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.2);color:rgba(255,215,0,.6);cursor:default}
  .buy-btn.equip-btn{background:rgba(100,255,180,.08);border-color:rgba(100,255,180,.2);color:rgba(100,255,180,.6);cursor:pointer}
  .buy-btn.equip-btn:hover{background:rgba(100,255,180,.15)}

  /* ─── Toast ─── */
  .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);padding:8px 20px;border-radius:12px;font-size:.7rem;font-weight:700;z-index:60;opacity:0;transition:all .3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.unlock{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:#ffd700}
  .toast.equip{background:rgba(100,255,180,.12);border:1px solid rgba(100,255,180,.25);color:rgba(100,255,180,.8)}
  .toast.achievement{background:rgba(255,215,0,.18);border:1px solid rgba(255,215,0,.5);color:#ffd700;font-size:.72rem}

  /* ─── Offline Modal ─── */
  .offline-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200}
  .offline-card{background:#1a1a2e;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:32px 40px;text-align:center;color:#fff;min-width:220px}
  .offline-title{font-size:1rem;font-weight:700;margin-bottom:6px}
  .offline-sub{font-size:.72rem;color:rgba(255,255,255,.45);margin-bottom:14px;line-height:1.5}
  .offline-earned{font-size:1.7rem;font-weight:700;color:#ffd700;margin-bottom:22px}
  .offline-ok{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:#ffd700;padding:8px 28px;border-radius:12px;cursor:pointer;font-size:.82rem;font-family:inherit;transition:background .2s}
  .offline-ok:hover{background:rgba(255,215,0,.25)}

  /* ═══ PIANO ═══ */
  .piano-stage{position:fixed;bottom:0;left:0;right:0;z-index:5}
  .piano-body{width:100%;display:flex;flex-direction:column;align-items:center;background:#0c0806}

  .piano-fallboard{width:100%;height:26px;
    background:linear-gradient(180deg,#201208,#160c04);
    border-top:1px solid #3a2410;
    position:relative;overflow:hidden}
  /* Subtle wood grain */
  .piano-fallboard::before{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(93deg,transparent,transparent 8px,rgba(255,200,120,.015) 8px,rgba(255,200,120,.015) 9px)}
  /* Gold accent line */
  .piano-fallboard::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(200,170,100,.18),transparent)}

  .piano-felt{width:100%;height:5px;background:#6e1212;border-bottom:1px solid #3a0808}

  .piano-keybed{display:flex;justify-content:center;width:100%;background:#020202;padding:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-x}
  .piano-keybed::-webkit-scrollbar{display:none}
  .keys-container{display:flex;position:relative;touch-action:none}

  .white-key{
    width:52px;height:230px;cursor:pointer;
    position:relative;z-index:1;margin:0;flex-shrink:0;
    border:none;border-radius:0 0 4px 4px;
    touch-action:none;
  }
  .white-key .label{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);pointer-events:none;text-align:center}
  .white-key .label .key-char{display:block;font-size:.6rem;font-weight:700;color:rgba(80,70,60,.35)}
  .white-key .label .note-name{display:block;font-size:.34rem;color:rgba(80,70,60,.2);margin-top:1px}
  .white-key.left-zone .label .key-char{color:rgba(60,100,180,.3)}
  .white-key.right-zone .label .key-char{color:rgba(180,60,140,.3)}

  .black-key{
    width:32px;height:148px;
    position:absolute;z-index:2;cursor:pointer;
    border:none;border-radius:0 0 3px 3px;
    touch-action:none;
  }
  .black-key .label{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:.4rem;font-weight:700;pointer-events:none}

  .piano-bottom{width:100%;height:10px;background:#060402}

  .sustain-indicator{position:fixed;bottom:266px;left:50%;transform:translateX(-50%);padding:4px 14px;border-radius:12px;font-size:.58rem;font-weight:500;letter-spacing:1px;opacity:0;transition:opacity .2s;background:rgba(100,255,180,.1);border:1px solid rgba(100,255,180,.2);color:rgba(100,255,180,.6);z-index:10;pointer-events:none}
  .sustain-indicator.on{opacity:1}
  .hint{position:fixed;bottom:260px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.08);font-size:.48rem;font-weight:300;letter-spacing:1px;z-index:10;pointer-events:none;white-space:nowrap}

  /* ═══════════════════════════════════
     KEY SKINS — Hard edges, zero blur
     ═════════════════════════════════ */

  /* ── IVORY ── */
  .skin-ivory .white-key{
    background:#f4f1eb;
    border-left:1px solid #b8b4aa;
    border-bottom:3px solid #a8a498;
    box-shadow:inset 0 -6px 0 #e2ded6;
  }
  .skin-ivory .white-key:first-child{border-left:none}
  .skin-ivory .white-key:hover{background:#f9f7f2}
  .skin-ivory .white-key.active{
    background:#eae7e0;
    border-bottom:1px solid #a8a498;
    box-shadow:inset 0 -2px 0 #dcdad2,inset 0 3px 0 rgba(0,0,0,.04);
    transform:translateY(2px);
  }

  .skin-ivory .black-key{
    background:#1a1a1a;
    border-left:1px solid #333;
    border-right:1px solid #333;
    border-bottom:4px solid #0a0a0a;
    box-shadow:
      inset 0 -8px 0 #222,
      inset 0 1px 0 #444,
      -2px 0 0 #000,
      2px 0 0 #000,
      0 4px 0 #000;
  }
  .skin-ivory .black-key .label{color:rgba(255,255,255,.12)}
  .skin-ivory .black-key:hover{background:#242424}
  .skin-ivory .black-key.active{
    background:#141414;
    border-bottom:1px solid #0a0a0a;
    box-shadow:
      inset 0 -2px 0 #1c1c1c,
      inset 0 3px 0 rgba(0,0,0,.3),
      -2px 0 0 #000,
      2px 0 0 #000,
      0 1px 0 #000;
    transform:translateY(3px);
  }

  /* ── MARBLE ── */
  .skin-marble .white-key{
    background:#ededf0;
    border-left:1px solid #b0b0b8;
    border-bottom:3px solid #9898a4;
    box-shadow:inset 0 -6px 0 #dadade;
  }
  .skin-marble .white-key:first-child{border-left:none}
  .skin-marble .white-key:hover{background:#f4f4f8}
  .skin-marble .white-key.active{
    background:#e0e0e6;border-bottom:1px solid #9898a4;
    box-shadow:inset 0 -2px 0 #d2d2d8,inset 0 3px 0 rgba(0,0,0,.04);transform:translateY(2px);
  }
  .skin-marble .black-key{
    background:#222228;border-left:1px solid #3a3a40;border-right:1px solid #3a3a40;
    border-bottom:4px solid #0c0c10;
    box-shadow:inset 0 -8px 0 #2a2a30,inset 0 1px 0 #48484e,-2px 0 0 #08080c,2px 0 0 #08080c,0 4px 0 #08080c;
  }
  .skin-marble .black-key .label{color:rgba(255,255,255,.1)}
  .skin-marble .black-key:hover{background:#2a2a30}
  .skin-marble .black-key.active{
    background:#1a1a20;border-bottom:1px solid #0c0c10;
    box-shadow:inset 0 -2px 0 #22222a,inset 0 3px 0 rgba(0,0,0,.3),-2px 0 0 #08080c,2px 0 0 #08080c,0 1px 0 #08080c;transform:translateY(3px);
  }

  /* ── MIDNIGHT ── */
  .skin-midnight .white-key{
    background:#282840;
    border-left:1px solid #3c3c5e;
    border-bottom:3px solid #181830;
    box-shadow:inset 0 -6px 0 #222238;
  }
  .skin-midnight .white-key:first-child{border-left:none}
  .skin-midnight .white-key .label .key-char{color:rgba(140,140,255,.25)}
  .skin-midnight .white-key .label .note-name{color:rgba(140,140,255,.12)}
  .skin-midnight .white-key:hover{background:#30304a}
  .skin-midnight .white-key.active{
    background:#202036;border-bottom:1px solid #181830;
    box-shadow:inset 0 -2px 0 #1c1c32,inset 0 3px 0 rgba(0,0,20,.2);transform:translateY(2px);
  }
  .skin-midnight .black-key{
    background:#0e0e22;border-left:1px solid #1e1e38;border-right:1px solid #1e1e38;
    border-bottom:4px solid #060614;
    box-shadow:inset 0 -8px 0 #12122a,inset 0 1px 0 #262642,-2px 0 0 #04040e,2px 0 0 #04040e,0 4px 0 #04040e;
  }
  .skin-midnight .black-key .label{color:rgba(120,120,255,.1)}
  .skin-midnight .black-key:hover{background:#141430}
  .skin-midnight .black-key.active{
    background:#0a0a1a;border-bottom:1px solid #060614;
    box-shadow:inset 0 -2px 0 #0e0e22,inset 0 3px 0 rgba(0,0,20,.4),-2px 0 0 #04040e,2px 0 0 #04040e,0 1px 0 #04040e;transform:translateY(3px);
  }
  .skin-midnight .piano-fallboard{background:linear-gradient(180deg,#141028,#0c0818)}
  .skin-midnight .piano-felt{background:#3a1248}

  /* ── ROSEGOLD ── */
  .skin-rosegold .white-key{
    background:#f4ebe4;
    border-left:1px solid #c8b4a8;
    border-bottom:3px solid #b09888;
    box-shadow:inset 0 -6px 0 #e4d8ce;
  }
  .skin-rosegold .white-key:first-child{border-left:none}
  .skin-rosegold .white-key:hover{background:#faf2ec}
  .skin-rosegold .white-key.active{
    background:#ece0d8;border-bottom:1px solid #b09888;
    box-shadow:inset 0 -2px 0 #dcd0c6,inset 0 3px 0 rgba(80,40,20,.04);transform:translateY(2px);
  }
  .skin-rosegold .black-key{
    background:#261814;border-left:1px solid #3e2a24;border-right:1px solid #3e2a24;
    border-bottom:4px solid #100804;
    box-shadow:inset 0 -8px 0 #2e1e1a,inset 0 1px 0 #4a3430,-2px 0 0 #0a0402,2px 0 0 #0a0402,0 4px 0 #0a0402;
  }
  .skin-rosegold .black-key .label{color:rgba(255,200,180,.1)}
  .skin-rosegold .black-key:hover{background:#302018}
  .skin-rosegold .black-key.active{
    background:#1e100c;border-bottom:1px solid #100804;
    box-shadow:inset 0 -2px 0 #261814,inset 0 3px 0 rgba(0,0,0,.3),-2px 0 0 #0a0402,2px 0 0 #0a0402,0 1px 0 #0a0402;transform:translateY(3px);
  }
  .skin-rosegold .piano-fallboard{background:linear-gradient(180deg,#281810,#1c0e08)}
  .skin-rosegold .piano-felt{background:#8b2020}

  /* ─── Pixel Cat ─── */
  .pixel-cat{position:absolute;z-index:3;pointer-events:none;bottom:120px;transition:left .6s ease-in-out}
  .pixel-cat.face-left .cat-sprite{transform:scale(3) scaleX(-1);transform-origin:bottom right}
  .cat-sprite{width:1px;height:1px;transform:scale(3);transform-origin:bottom left;image-rendering:pixelated}
  .cat-sprite.idle{box-shadow:
    1px 0 0 #c90,6px 0 0 #c90,
    0px 1px 0 #c90,1px 1px 0 #fc0,6px 1px 0 #fc0,7px 1px 0 #c90,

  ],

const SONGS={
  random:null,
  twinkle:['C4','C4','G4','G4','A4','A4','G4', 'F4','F4','E4','E4','D4','D4','C4', 'G4','G4','F4','F4','E4','E4','D4', 'G4','G4','F4','F4','E4','E4','D4', 'C4','C4','G4','G4','A4','A4','G4', 'F4','F4','E4','E4','D4','D4','C4'],
  birthday:['C4','C4','D4','C4','F4','E4', 'C4','C4','D4','C4','G4','F4', 'C4','C4','C5','A4','F4','E4','D4', 'A#4','A#4','A4','F4','G4','F4'],
  ode_to_joy:['E4','E4','F4','G4','G4','F4','E4','D4', 'C4','C4','D4','E4','E4','D4','D4', 'E4','E4','F4','G4','G4','F4','E4','D4', 'C4','C4','D4','E4','D4','C4','C4'],
  fur_elise:['E4','D#4','E4','D#4','E4','B3','D4','C4','A3', 'C3','E3','A3','B3', 'C4','E4','D#4','E4','D#4','E4','B3','D4','C4','A3', 'C3','E3','A3','B3','C4'],
  canon:['E4','D4','C4','B3','A3','G3','A3','B3', 'C4','B3','C4','D4','E4','D4','C4','B3', 'A3','G3','A3','B3','C4','D4','E4','G4', 'F4','E4','D4','C4','D4','C4','B3','A3'],
  turkish:['B3','A4','G#4','A4', 'C4','A4','G#4','A4', 'C4','C5','B4','C5','E5','C5', 'B4','A4','B4','A4','G4','A4', 'G4','F4','E4','F4','G4','F4', 'E4','D4','C4','D4','E4'],
};

// ═══ LEVEL SYSTEM ═══
let playerLevel=_saved?.playerLevel??1;
let playerXP=_saved?.playerXP??0;
const LEVEL_TIERS=[
  {min:1,max:10,name:'초보 피아니스트',badge:'🎹',gradient:'linear-gradient(90deg,#3b82f6,#8b5cf6)',bg:{r:8,g:8,b:12}},
  {min:11,max:25,name:'수련생',badge:'🎵',gradient:'linear-gradient(90deg,#8b5cf6,#b8a9c9)',bg:{r:10,g:8,b:16}},
  {min:26,max:50,name:'연주자',badge:'🎼',gradient:'linear-gradient(90deg,#f59e0b,#f7a072)',bg:{r:14,g:10,b:8}},
  {min:51,max:75,name:'명인',badge:'🏅',gradient:'linear-gradient(90deg,#ffd700,#ffaa00)',bg:{r:12,g:12,b:6}},
  {min:76,max:99,name:'대가',badge:'👑',gradient:'linear-gradient(90deg,#ff6fd8,#ff2200)',bg:{r:16,g:8,b:12}},
  {min:100,max:100,name:'전설의 피아니스트',badge:'💎',gradient:'linear-gradient(90deg,#00fff0,#ffd700,#ff6fd8)',bg:{r:12,g:10,b:14}},
];
function xpForLevel(lv){return Math.floor(50*Math.pow(lv,1.5))}
function getTier(lv){return LEVEL_TIERS.find(t=>lv>=t.min&&lv<=t.max)||LEVEL_TIERS[0]}
function getParticleCap(){if(playerLevel>=90)return 400;if(playerLevel>=65)return 350;if(playerLevel>=40)return 300;if(playerLevel>=20)return 250;return 200;}
function getLevelBonus(){return 1+playerLevel*0.005}
function addXP(amount){
  if(playerLevel>=100)return;
  playerXP+=amount;
  let leveled=false;
  while(playerLevel<100&&playerXP>=xpForLevel(playerLevel)){
    playerXP-=xpForLevel(playerLevel);
    playerLevel++;
    leveled=true;
    onLevelUp();
  }
  if(playerLevel>=100)playerXP=0;
  if(typeof updateXPDisplay==='function')updateXPDisplay();
  if(leveled)saveState();
}
// Retroactive level for existing saves
if(_saved&&!_saved.playerLevel&&totalNotes>0){
  let xpPool=Math.floor(totalNotes*0.8);
  playerLevel=1;playerXP=0;
  while(playerLevel<100&&xpPool>=xpForLevel(playerLevel)){
    xpPool-=xpForLevel(playerLevel);
    playerLevel++;
  }
  playerXP=Math.min(xpPool,xpForLevel(playerLevel)-1);
  saveState();
}
function updateXPDisplay(){
  const tier=getTier(playerLevel);
  const badgeEl=document.getElementById('levelBadge');
  const numEl=document.getElementById('levelNum');
  const titleEl=document.getElementById('levelTitle');
  const fillEl=document.getElementById('xpFill');
  if(badgeEl)badgeEl.textContent=tier.badge;
  if(numEl)numEl.textContent='Lv.'+playerLevel;
  if(titleEl)titleEl.textContent=tier.name;
  if(fillEl){
    const pct=playerLevel>=100?100:Math.floor(playerXP/xpForLevel(playerLevel)*100);
    fillEl.style.width=pct+'%';
    fillEl.style.background=tier.gradient;
  }
}
function onLevelUp(){
  const prevKeys=noteData.length;
  const newNotes=getActiveNotes(playerLevel);
  const hasNewKeys=newNotes.length>prevKeys;
  if(hasNewKeys)rebuildPiano(true);
  applyTierClass();
  updateXPDisplay();
  // Level-up toast
  const tier=getTier(playerLevel);
  showToast(`${tier.badge} Lv.${playerLevel}! ${tier.name}`,'achievement');
  // Level-up particles
  spawnLevelUpParticles();
  // Level-up sound
  playLevelUpSound();
  // Update background base color for tier
  const bg=tier.bg;
  bgPulse.target={r:bg.r,g:bg.g,b:bg.b};
}
function spawnLevelUpParticles(){
  const tier=getTier(playerLevel);
  const tierColors={
    1:['#3b82f6','#8b5cf6','#60a5fa'],
    11:['#8b5cf6','#b8a9c9','#a78bfa'],
    26:['#f59e0b','#f7a072','#fbbf24'],
    51:['#ffd700','#ffaa00','#fde68a'],
    76:['#ff6fd8','#ff2200','#f472b6'],
    100:['#00fff0','#ffd700','#ff6fd8'],
  };
  const colors=tierColors[tier.min]||tierColors[1];
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<40;i++){
    particles.push({x:cx,y:cy,vx:(Math.random()-.5)*12,vy:(Math.random()-.5)*12-3,life:1,decay:.008+Math.random()*.01,size:4+Math.random()*4,color:colors[~~(Math.random()*colors.length)],glow:true,shape:Math.random()>.5?'star':'circle'});
  }
}
function playLevelUpSound(){
  if(audioCtx.state==='suspended')audioCtx.resume();
  const notes=[523.25,659.25,783.99]; // C5,E5,G5
  notes.forEach((freq,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,audioCtx.currentTime+i*0.1);
    g.gain.linearRampToValueAtTime(.15,audioCtx.currentTime+i*0.1+.05);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+i*0.1+.8);
    o.connect(g);g.connect(masterGain);
    o.start(audioCtx.currentTime+i*0.1);o.stop(audioCtx.currentTime+i*0.1+1);
    o.onended=()=>{o.disconnect();g.disconnect()};
  });
}

// ═══ NOTE DATA (88 keys) ═══
const KEY_BINDINGS={
  'C3':'z','C#3':'s','D3':'x','D#3':'d','E3':'c','F3':'v','F#3':'g','G3':'b','G#3':'h','A3':'n','A#3':'j','B3':'m',
  'C4':'q','C#4':'2','D4':'w','D#4':'3','E4':'e','F4':'r','F#4':'5','G4':'t','G#4':'6','A4':'y','A#4':'7','B4':'u',
  'C5':'i','C#5':'9','D5':'o','D#5':'0','E5':'p'
};
const HAND_MAP={'C3':'left','C#3':'left','D3':'left','D#3':'left','E3':'left','F3':'left','F#3':'left','G3':'left','G#3':'left','A3':'left','A#3':'left','B3':'left'};

function generateAllNotes(){
  const noteNames=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const blackSet=new Set(['C#','D#','F#','G#','A#']);
  const result=[];
  // A0, B0
  [{n:'A',o:0,f:27.50},{n:'A#',o:0,f:29.14},{n:'B',o:0,f:30.87}].forEach(x=>{
    const nn=x.n+x.o;
    result.push({note:nn,freq:x.f,type:blackSet.has(x.n)?'black':'white',key:KEY_BINDINGS[nn]||null,hand:HAND_MAP[nn]||null});
  });
  // C1-B7
  for(let oct=1;oct<=7;oct++){
    noteNames.forEach(n=>{
      const nn=n+oct;
      const freq=27.5*Math.pow(2,(result.length-0.5)/12); // approximate
      result.push({note:nn,freq:0,type:blackSet.has(n)?'black':'white',key:KEY_BINDINGS[nn]||null,hand:HAND_MAP[nn]||null});
    });
  }
  // C8
  result.push({note:'C8',freq:0,type:'white',key:null,hand:null});
  // Fix frequencies using A4=440Hz standard
  const a4Idx=result.findIndex(n=>n.note==='A4');
  result.forEach((n,i)=>{n.freq=440*Math.pow(2,(i-a4Idx)/12)});
  return result;
}
const ALL_NOTES=generateAllNotes();

// Unlock schedule: distance from C4 center
function assignUnlockLevels(){
  const c4Idx=ALL_NOTES.findIndex(n=>n.note==='C4');
  const c5Idx=ALL_NOTES.findIndex(n=>n.note==='C5');
  // Level 1: white keys C4-C5 only
  // Level 3: black keys C4-C5
  // Then expand outward
  const unlockMap={};
  ALL_NOTES.forEach((n,i)=>{
    const nn=n.note;
    // C4-C5 range
    if(i>=c4Idx&&i<=c5Idx){
      unlockMap[nn]=n.type==='black'?3:1;
    } else {
      // distance from nearest edge of C4-C5
      const dist=i<c4Idx?(c4Idx-i):(i-c5Idx);
      // Map distance to level: roughly every 3 semitones = 5 levels
      const lv=Math.min(100,Math.max(5,Math.ceil(dist/3)*5+3));
      unlockMap[nn]=lv;
    }
  });
  // Fine-tune known milestones
  // Lv5: G3-C5
  ['G3','G#3','A3','A#3','B3'].forEach(nn=>{unlockMap[nn]=5});
  // Lv10: C3-E5 (original range)
  ['C3','C#3','D3','D#3','E3','F3','F#3'].forEach(nn=>{unlockMap[nn]=10});
  ['C#5','D5','D#5','E5'].forEach(nn=>{if(unlockMap[nn]>10)unlockMap[nn]=10});
  return unlockMap;
}
const UNLOCK_MAP=assignUnlockLevels();
ALL_NOTES.forEach(n=>{n.unlockLevel=UNLOCK_MAP[n.note]||100});

function getActiveNotes(lv){return ALL_NOTES.filter(n=>n.unlockLevel<=lv)}

}

// Tone presets
const tonePresets={
  sine:    (f)=>[{type:'sine',freq:f,vol:.2},{type:'sine',freq:f*1.002,vol:.08}],
  triangle:(f)=>[{type:'triangle',freq:f,vol:.18},{type:'sine',freq:f*2,vol:.04}],
  warm:    (f)=>[{type:'sine',freq:f,vol:.18},{type:'sine',freq:f*2,vol:.06},{type:'sine',freq:f*3,vol:.02}],
  celesta: (f)=>[{type:'sine',freq:f,vol:.15},{type:'sine',freq:f*4,vol:.08},{type:'sine',freq:f*7.1,vol:.03}],
  synth:   (f)=>[{type:'sawtooth',freq:f,vol:.1},{type:'sawtooth',freq:f*1.005,vol:.1},{type:'sine',freq:f*.5,vol:.06}],
  organ:   (f)=>[{type:'sine',freq:f,vol:.12},{type:'sine',freq:f*2,vol:.1},{type:'sine',freq:f*3,vol:.06},{type:'sine',freq:f*4,vol:.03}],
};

function playNote(ni,idx){
  if(audioCtx.state==='suspended')audioCtx.resume();
  const s=modeSettings[currentMode];
  const rb=Math.min(rageLevel/25,1);
  const pan=audioCtx.createStereoPanner();
  pan.pan.value=(idx/Math.max(noteData.length,1))*1.6-.8;
  const dt=sustainOn?s.decay*2.5:s.decay;
  const harmonics=tonePresets[equipped.tone](ni.freq);
  harmonics.forEach(h=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=rageLevel>15?'sawtooth':h.type;
    o.frequency.value=h.freq;
    o.detune.value=s.detune+rb*15;
    const v=h.vol+rb*.04;
    g.gain.setValueAtTime(0,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(v,audioCtx.currentTime+s.attack);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dt);
    o.connect(g);g.connect(pan);
    o.start();o.stop(audioCtx.currentTime+dt+.1);
    o.onended=()=>{o.disconnect();g.disconnect()};
  });
  pan.connect(convolver);pan.connect(dryGain);
  // Disconnect panner after decay
  setTimeout(()=>{try{pan.disconnect()}catch(e){}},dt*1000+200);
}

function drawParticle(p){
  if(p.shape==='petal'){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    ctx.fillStyle=p.color;ctx.beginPath();ctx.ellipse(0,0,p.size*p.life,p.size*p.life*2.2,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  } else if(p.shape==='star'){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    ctx.fillStyle=p.color;const s=p.size*p.life;
    ctx.beginPath();for(let i=0;i<5;i++){ctx.lineTo(Math.cos((i*72-90)*Math.PI/180)*s,Math.sin((i*72-90)*Math.PI/180)*s);ctx.lineTo(Math.cos((i*72-54)*Math.PI/180)*s*.4,Math.sin((i*72-54)*Math.PI/180)*s*.4)}
    ctx.closePath();ctx.fill();ctx.restore();
  } else if(p.shape==='streak'){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle||0);
    ctx.fillStyle=p.color;ctx.fillRect(-p.size*p.life*2,-1,p.size*p.life*4,2);
    ctx.restore();
  } else {
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
  }
}

  else{_furyWasActive=false;rageLabelEl.textContent=rageLevel>1?'♪':'\u00A0';}

  // ── Canvas render ──
  bgPulse.r+=(bgPulse.target.r-bgPulse.r)*.04;bgPulse.g+=(bgPulse.target.g-bgPulse.g)*.04;bgPulse.b+=(bgPulse.target.b-bgPulse.b)*.04;
  bgPulse.target.r+=(8-bgPulse.target.r)*.008;bgPulse.target.g+=(8-bgPulse.target.g)*.008;bgPulse.target.b+=(12-bgPulse.target.b)*.008;
  ctx.fillStyle=`rgb(${~~bgPulse.r},${~~bgPulse.g},${~~bgPulse.b})`;ctx.fillRect(0,0,canvas.width,canvas.height);

  // No shadowBlur — just draw particles directly (massive perf gain)
  let alive=0;
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.drift)p.vx+=Math.sin(p.y*.02)*p.drift;
    if(p.rotV)p.rot+=p.rotV;
    if(p.shape!=='streak')p.vy+=.04;
    if(p.life>0){
      ctx.globalAlpha=p.life*.8;
      drawParticle(p);
      alive++;
    }
  }
  ctx.globalAlpha=1;
  // Clean dead particles periodically (not every frame)
  if(particles.length>alive+50)particles=particles.filter(p=>p.life>0);

  requestAnimationFrame(animate);
}
animate();

function toggleShop(){

function renderShop(){
  const scroll=document.getElementById('shopScroll');
  scroll.innerHTML='';
  document.getElementById('shopCurrency').textContent=formatNum(notes);

  const cats=[
    {key:'modes',title:'🎼',items:shopItems.modes,ownedKey:'modes',equippedKey:'mode'},
    {key:'tones',title:'🎵',items:shopItems.tones,ownedKey:'tones',equippedKey:'tone'},
    {key:'particles',title:'✦',items:shopItems.particles,ownedKey:'particles',equippedKey:'particles'},
    {key:'skins',title:'🎹',items:shopItems.skins,ownedKey:'skins',equippedKey:'skin'},
    {key:'autoTappers',title:'🤖',items:shopItems.autoTappers,ownedKey:'autoTappers',equippedKey:null},
    {key:'cats',title:'🐱',items:shopItems.cats,ownedKey:'cats',equippedKey:'cat'},
    {key:'songs',title:'🎶',items:shopItems.songs,ownedKey:'songs',equippedKey:'song'},
  ];

  cats.forEach(cat=>{
    const catEl=document.createElement('div');catEl.className='shop-category';
    catEl.innerHTML=`<div class="shop-cat-title">${cat.title}</div>`;

    cat.items.forEach(item=>{
      const isOwned=owned[cat.ownedKey].includes(item.id);
      const isEquipped=cat.equippedKey?equipped[cat.equippedKey]===item.id:owned[cat.ownedKey].includes(item.id);
      // prereq 체크 (자동연주기 / 곡)
      const prereqMet=!item.prereq||owned[cat.ownedKey].includes(item.prereq)||owned.autoTappers.includes(item.prereq);
      const levelMet=!item.reqLevel||playerLevel>=item.reqLevel;
      const canBuy=!isOwned&&notes>=item.cost&&prereqMet&&levelMet;

      const el=document.createElement('div');
      el.className=`shop-item ${isEquipped?'equipped':isOwned?'owned':''}`;

      let btnHtml='';
      if(isEquipped&&cat.equippedKey&&cat.key==='cats') btnHtml=`<button class="buy-btn equip-btn equipped-btn" data-cat="${cat.key}" data-id="${item.id}">ON</button>`;
      else if(isEquipped&&cat.equippedKey) btnHtml=`<button class="buy-btn equipped-btn">✓</button>`;
      else if(isOwned&&cat.equippedKey) btnHtml=`<button class="buy-btn equip-btn" data-cat="${cat.key}" data-id="${item.id}">${cat.key==='cats'?'OFF':'equip'}</button>`;
      else if(isOwned) btnHtml=`<button class="buy-btn equipped-btn">✓</button>`;
      else if(!levelMet) btnHtml=`<button class="buy-btn cant-buy" style="font-size:.55rem">Lv.${item.reqLevel}</button>`;
      else if(!prereqMet) btnHtml=`<button class="buy-btn cant-buy">🔒</button>`;
      else btnHtml=`<button class="buy-btn ${canBuy?'can-buy':'cant-buy'}" data-cat="${cat.key}" data-id="${item.id}" data-cost="${item.cost}">♪${item.cost}</button>`;

      const lvTag=item.reqLevel&&!isOwned?` <span style="color:${levelMet?'#4ade80':'#ef4444'};font-size:.45rem">Lv.${item.reqLevel}</span>`:'';
      el.innerHTML=`<div class="item-icon">${item.icon}</div><div class="item-info"><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}${lvTag}</div></div><div class="item-action">${btnHtml}</div>`;
      catEl.appendChild(el);
    });
    // 자동연주 ON/OFF 토글
    if(cat.key==='autoTappers'&&owned.autoTappers.length>0){
      const toggleEl=document.createElement('div');
      toggleEl.className=`shop-item ${equipped.autoTapOn?'equipped':'owned'}`;
      toggleEl.innerHTML=`<div class="item-icon">⏯️</div><div class="item-info"><div class="item-name">자동 연주</div><div class="item-desc">${equipped.autoTapOn?'자동 연주 중':'일시 정지'}</div></div><div class="item-action"><button class="buy-btn equip-btn ${equipped.autoTapOn?'equipped-btn':''}" id="autoTapToggle">${equipped.autoTapOn?'ON':'OFF'}</button></div>`;
      catEl.appendChild(toggleEl);
    }
    scroll.appendChild(catEl);
  });

  // ── 업적 탭 ──
  const achEl=document.createElement('div');achEl.className='shop-category';
  achEl.innerHTML=`<div class="shop-cat-title">🏆</div>`;
  ACH_DEFS.forEach(a=>{
    const isUnlocked=owned.achievements.includes(a.id);
    const el=document.createElement('div');
    el.className=`shop-item ${isUnlocked?'equipped':''}`;
    const btnHtml=isUnlocked
      ?`<button class="buy-btn equipped-btn">✓</button>`
      :`<button class="buy-btn cant-buy" style="font-size:.6rem">+♪${formatNum(a.reward)}</button>`;
    el.innerHTML=`<div class="item-icon" style="${isUnlocked?'':'filter:grayscale(1);opacity:.4'}">${a.icon}</div><div class="item-info"><div class="item-name">${a.name}</div><div class="item-desc">${a.desc}</div></div><div class="item-action">${btnHtml}</div>`;
    achEl.appendChild(el);
  });
  scroll.appendChild(achEl);

  // Event delegation
  scroll.querySelectorAll('.can-buy').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const cat=btn.dataset.cat,id=btn.dataset.id,cost=parseInt(btn.dataset.cost);
      if(notes>=cost)buyItem(cat,id,cost);
    });
  });
  scroll.querySelectorAll('.equip-btn').forEach(btn=>{
    btn.addEventListener('click',()=>equipItem(btn.dataset.cat,btn.dataset.id));
  });
  const atToggle=document.getElementById('autoTapToggle');
  if(atToggle)atToggle.addEventListener('click',()=>{
    equipped.autoTapOn=!equipped.autoTapOn;
    updateAutoTap();saveState();renderShop();
    showToast(`⏯️ 자동 연주 ${equipped.autoTapOn?'ON':'OFF'}!`,equipped.autoTapOn?'equip':'unlock');
  });
}

function buyItem(cat,id,cost){
  notes-=cost;
  if(cat==='tones')owned.tones.push(id);
  else if(cat==='particles')owned.particles.push(id);
  else if(cat==='skins')owned.skins.push(id);
  else if(cat==='autoTappers'){owned.autoTappers.push(id);updateAutoTap();checkAchievements();}
  else if(cat==='cats'){owned.cats.push(id);}
  else if(cat==='songs'){owned.songs.push(id);}

  // Auto equip
  if(cat==='tones')equipped.tone=id;
  else if(cat==='particles')equipped.particles=id;
  else if(cat==='skins'){equipped.skin=id;applySkin()}
  else if(cat==='cats'){equipped.cat=id;updatePixelCat();}
  else if(cat==='songs'){equipped.song=id;songPosition=0;updateAutoTap();}

  showToast(`${shopItems[cat].find(x=>x.id===id).icon} ${shopItems[cat].find(x=>x.id===id).name} unlocked!`,'unlock');
  saveState();renderShop();updateCurrencyDisplay();
}

function equipItem(cat,id){
  if(cat==='modes'){currentMode=id;equipped.mode=id;reverbGain.gain.value=modeSettings[id].reverb;}
  else if(cat==='tones')equipped.tone=id;
  else if(cat==='particles')equipped.particles=id;
  else if(cat==='skins'){equipped.skin=id;applySkin()}
  else if(cat==='cats'){equipped.cat=equipped.cat===id?null:id;updatePixelCat();}
  else if(cat==='songs'){equipped.song=id;songPosition=0;updateAutoTap();}
  const _item=shopItems[cat].find(x=>x.id===id);
  const _isOn=cat==='cats'?equipped.cat===id:true;
  showToast(`${_item.icon} ${_item.name} ${_isOn?'ON':'OFF'}!`,_isOn?'equip':'unlock');
  saveState();
  renderShop();
}

let autoTapInterval=null,songPosition=0;
function updateAutoTap(){
  clearInterval(autoTapInterval);autoTapInterval=null;songPosition=0;
  const rates={auto_lv1:1,auto_lv2:3,auto_lv3:8};
  const maxRate=owned.autoTappers.reduce((m,id)=>Math.max(m,rates[id]||0),0);
  if(!maxRate||!equipped.autoTapOn){updateSongIndicator();return;}
  autoTapInterval=setInterval(()=>{
    const songNotes=SONGS[equipped.song];
    let idx;
    if(songNotes){
      const name=songNotes[songPosition%songNotes.length];
      idx=noteNameToIndex(name);
      songPosition++;
      if(idx<0)idx=Math.floor(Math.random()*noteData.length);
    } else{idx=Math.floor(Math.random()*noteData.length);}
    triggerKey(idx,true);
  },Math.round(1000/maxRate));
  updateSongIndicator();
}
function updateSongIndicator(){
  const el=document.getElementById('songIndicator'),nameEl=document.getElementById('songName');
  if(!el)return;
  const rates={auto_lv1:1,auto_lv2:3,auto_lv3:8};
  const maxRate=owned.autoTappers.reduce((m,id)=>Math.max(m,rates[id]||0),0);
  if(maxRate>0&&equipped.autoTapOn){const def=shopItems.songs.find(s=>s.id===equipped.song);nameEl.textContent=def?def.name:'랜덤';el.style.display='';}
  else{el.style.display='none';}
}

// ═══ PIXEL CAT ═══
let catState={active:false,visiting:false,currentKeyIdx:0,timer:null,walkFrame:1,walkAnimTimer:null,direction:1,notesPlayed:0,cycleTimer:null};
const CAT_VISIT_NOTES=3+Math.floor(Math.random()*4); // 3~6 notes per visit
const CAT_CYCLE_MS=5*60*1000; // 5 minutes

function startCatCycle(){
  stopCatCycle();
  if(!owned.cats.includes('pixel_cat')||!equipped.cat)return;
  catVisit();
  catState.cycleTimer=setInterval(catVisit,CAT_CYCLE_MS);
}
function stopCatCycle(){
  clearInterval(catState.cycleTimer);catState.cycleTimer=null;
  catEndVisit();
}
function catVisit(){
  if(catState.visiting||!equipped.cat)return;
  catState.visiting=true;catState.active=true;catState.notesPlayed=0;
  pixelCatEl.style.display='block';
  catState.currentKeyIdx=_whiteKeyIndices[Math.floor(Math.random()*_whiteKeyIndices.length)];
  positionCatOnKey(catState.currentKeyIdx);
  catScheduleNext();
}
function catEndVisit(){
  catState.active=false;catState.visiting=false;
  clearTimeout(catState.timer);clearInterval(catState.walkAnimTimer);
  pixelCatEl.style.display='none';
}
function catScheduleNext(){
  if(!catState.active)return;
  catSpriteEl.className='cat-sprite idle';
  catState.timer=setTimeout(catPickTarget,800+Math.random()*1700);
}
function catPickTarget(){
  if(!catState.active)return;
  const curWPos=_whiteKeyIndices.indexOf(catState.currentKeyIdx);
  const step=(Math.random()>.5?1:-1)*(1+Math.floor(Math.random()*3));
  const newWPos=Math.max(0,Math.min(_whiteKeyIndices.length-1,curWPos+step));
  const targetIdx=_whiteKeyIndices[newWPos];
  catState.direction=newWPos>curWPos?1:-1;
  if(catState.direction===-1)pixelCatEl.classList.add('face-left');
  else pixelCatEl.classList.remove('face-left');
  catState.walkAnimTimer=setInterval(()=>{
    catState.walkFrame=catState.walkFrame===1?2:1;
    catSpriteEl.className='cat-sprite walk-'+catState.walkFrame;
  },200);
  positionCatOnKey(targetIdx);
  catState.timer=setTimeout(()=>{
    clearInterval(catState.walkAnimTimer);
    catState.currentKeyIdx=targetIdx;
    triggerKey(targetIdx);
    setTimeout(()=>releaseKey(targetIdx),150);
    if(Math.random()>.6){
      const bk=catFindNearbyBlack(targetIdx);
      if(bk!==null){triggerKey(bk);setTimeout(()=>releaseKey(bk),120);}
    }
    catState.notesPlayed++;
    if(catState.notesPlayed>=CAT_VISIT_NOTES){catEndVisit();}
    else{catScheduleNext();}
  },620);
}
function positionCatOnKey(idx){
  const el=pianoKeyEls[idx];if(!el)return;
  pixelCatEl.style.left=(el.offsetLeft+el.offsetWidth/2-12)+'px';
}
function catFindNearbyBlack(wIdx){
  for(const off of[1,-1]){const ci=wIdx+off;if(ci>=0&&ci<noteData.length&&noteData[ci].type==='black')return ci;}
  return null;
}
function updatePixelCat(){
  if(owned.cats.includes('pixel_cat')&&equipped.cat)startCatCycle();
  else stopCatCycle();
}

function initOfflineEarnings(){
  const last=_saved?.lastOnline;
  if(!last)return;
  const secs=Math.min((Date.now()-last)/1000,8*3600);
  if(secs<60)return;
  const autoRates={auto_lv1:1,auto_lv2:3,auto_lv3:8};
  const autoRate=owned.autoTappers.reduce((m,id)=>Math.max(m,autoRates[id]||0),0);
  const earned=Math.floor(secs*(0.5+autoRate)*getLevelBonus());
  notes+=earned;totalNotes+=earned;updateCurrencyDisplay();saveState();
  const mins=Math.floor(secs/60),hrs=Math.floor(mins/60);

    (hrs>0?hrs+'시간 ':'')+`${mins%60}분 동안 피아노가 연주됐어요`;
  document.getElementById('offlineEarned').textContent=`♪ ${formatNum(earned)} 획득!`;
  document.getElementById('offlineModal').style.display='flex';
}

let adProducts=[],adQueue=[],adShownIds=new Set(),adTimer=null;
let _furyAdTriggered=false,_adStartTime=Date.now();
const adStickerEl=document.getElementById('adSticker'),adImgEl=document.getElementById('adImg');

function loadAds(){
  adProducts=AD_PRODUCTS;
  checkPlaytimeAds();
}

function queueAd(p){
  if(adShownIds.has(p.id)||adQueue.find(x=>x.id===p.id))return;
  adQueue.push(p);
  if(!adStickerEl.classList.contains('show'))showNextAd();
}

function showNextAd(){
  if(!adQueue.length)return;
  const p=adQueue.shift();
  adShownIds.add(p.id);
  adImgEl.src=p.image||'';
  adStickerEl.dataset.url=p.url||'';
  adStickerEl.classList.add('show');
  clearTimeout(adTimer);adTimer=setTimeout(dismissAd,8000);
}

function dismissAd(){
  adStickerEl.classList.remove('show');
  clearTimeout(adTimer);
  if(adQueue.length)setTimeout(showNextAd,1500);
}

function checkNotesAds(){
  adProducts.filter(p=>p.trigger?.type==='notes').forEach(p=>{if(totalNotes>=p.trigger.value)queueAd(p);});
}

function checkFuryAd(){
  if(_furyAdTriggered)return;
  _furyAdTriggered=true;
  adProducts.filter(p=>p.trigger?.type==='fury').forEach(p=>queueAd(p));
}

function checkPlaytimeAds(){
  setInterval(()=>{
    const mins=(Date.now()-_adStartTime)/60000;
    adProducts.filter(p=>p.trigger?.type==='playtime'&&mins>=p.trigger.minutes).forEach(p=>queueAd(p));
  },30000);
}

document.getElementById('adClose').addEventListener('click',e=>{e.stopPropagation();dismissAd();});
document.getElementById('adInner').addEventListener('click',()=>{
  const url=adStickerEl.dataset.url;if(!url)return;
  adStickerEl.classList.add('disclosing');
  setTimeout(()=>{window.open(url,'_blank','noopener,noreferrer');dismissAd();adStickerEl.classList.remove('disclosing');},1500);
});

loadAds();
updateAutoTap();
updatePixelCat();
initOfflineEarnings();
checkAchievements();
</script>
